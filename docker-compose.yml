services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://fwr:fwr@postgres:5432/fwr
      - REDIS_URL=redis://redis:6379/0
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - UPSTREAM_KEY_FERNET_KEY=${UPSTREAM_KEY_FERNET_KEY}
      - PROBE_INTERVAL_MINUTES=${PROBE_INTERVAL_MINUTES:-15}
      - PROBE_MIN_BALANCE_USD=${PROBE_MIN_BALANCE_USD:-0.5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: fwr
      POSTGRES_PASSWORD: fwr
      POSTGRES_DB: fwr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fwr -d fwr"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
